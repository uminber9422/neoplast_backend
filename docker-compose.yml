version: '3.8'

services:
  neoplast_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neoplast-backend
    ports:
      - "${APP_PORT:-8004}:${APP_PORT:-8004}"
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8004}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - neoplast_network

volumes:
  backend_data:

networks:
  neoplast_network:
    name: neoplast_network
    driver: bridge